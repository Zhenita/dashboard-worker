<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N7R 业务看板</title>
<link rel="icon" href="https://fav.farm/🏢" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F9F8; --bg2:#F2F2F0; --surface:#FFFFFF;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.05);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.09),0 20px 48px rgba(0,0,0,.07);
  --t1:#1A1A1A; --t2:#3D3D3D; --t3:#737373; --t4:#ABABAB;
  --accent:#D97706; --accent-bg:rgba(217,119,6,.08);
  --green:#16A34A;  --green-bg:rgba(22,163,74,.09);
  --red:#DC2626;    --red-bg:rgba(220,38,38,.09);
  --orange:#EA580C; --orange-bg:rgba(234,88,12,.09);
  --blue:#2563EB;   --blue-bg:rgba(37,99,235,.09);
  --purple:#7C3AED; --purple-bg:rgba(124,58,237,.09);
  --teal:#0891B2;   --teal-bg:rgba(8,145,178,.09);
  --pink:#DB2777;   --pink-bg:rgba(219,39,119,.09);
  --gold:#B45309;   --gold-bg:rgba(180,83,9,.09);
  --amt-total:#B45309; --amt-paid:#16A34A; --amt-due:#DC2626;
  --r:14px; --rs:10px; --rx:7px;
  --f:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC","Microsoft YaHei UI","Microsoft YaHei","Hiragino Sans GB",Arial,sans-serif;
  --fm:"SF Mono","Menlo","Monaco","Consolas","Liberation Mono",monospace;
}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
input,textarea,select{outline:none;font-family:var(--f)}
input:focus,textarea:focus{border-color:var(--accent)!important}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:300;background:rgba(249,249,248,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px}
.logo-chip{background:linear-gradient(135deg,#1A1A1A,#444);border-radius:9px;padding:5px 12px;font-family:var(--fm);font-size:15px;font-weight:700;color:#fff;letter-spacing:1.5px}
.logo-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-.6px}
.logo-sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.logo-sub{font-size:13px;color:var(--t3)}
.hdr-r{display:flex;align-items:center;gap:12px}
.hdr-date{font-size:13px;color:var(--t3);font-weight:500}
.sync-meta{font-size:12px;color:var(--t4)}
.sync-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;background:var(--surface);border:1px solid var(--border);border-radius:22px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--f);transition:all .15s;box-shadow:var(--shadow)}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
.sync-btn.loading{opacity:.5;pointer-events:none}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.err{background:var(--red)}.dot.spin{background:var(--orange);animation:blink .5s infinite alternate}
@keyframes blink{to{opacity:.2}}

/* ── NAV ── */
nav{position:sticky;top:64px;z-index:200;background:rgba(249,249,248,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
nav::-webkit-scrollbar{display:none}
nav button{padding:13px 18px;font-size:14.5px;font-weight:500;color:var(--t3);border:none;background:none;cursor:pointer;white-space:nowrap;font-family:var(--f);border-bottom:2.5px solid transparent;transition:all .14s}
nav button.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent)}
nav button:hover:not(.active){color:var(--t1)}

/* ── MAIN ── */
main{padding:28px 32px;max-width:1600px;margin:0 auto;width:100%}

/* ── KPI ── */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.kpi{background:var(--surface);border-radius:var(--r);padding:22px 24px;border:1px solid var(--border);box-shadow:var(--shadow)}
.kpi-l{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.kpi-v{font-size:32px;font-weight:800;margin-top:10px;line-height:1;letter-spacing:-.5px}
.kpi-s{font-size:12.5px;color:var(--t4);margin-top:7px}

/* ── SECTION ── */
.sec{margin-top:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sec-title{font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.sec-more{font-size:13px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer;font-family:var(--f);padding:5px 12px;border-radius:22px;transition:background .14s}
.sec-more:hover{background:var(--accent-bg)}

/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}

/* ── PILLS ── */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:6px 16px;font-size:13.5px;font-weight:500;border-radius:22px;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;font-family:var(--f);transition:all .14s;box-shadow:var(--shadow)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pill:hover:not(.on){color:var(--t1);border-color:rgba(0,0,0,.15)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;font-family:var(--f)}
thead tr{background:var(--bg2)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border2);vertical-align:middle;color:var(--t2);font-size:14px}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(0,0,0,.015)}
.empty{color:var(--t4);font-style:italic;padding:26px 16px!important;text-align:center;font-size:14px}

/* ── GROUP ROWS ── */
.gr{cursor:pointer;user-select:none}
.gr td{background:rgba(0,0,0,.02);border-top:1.5px solid var(--border);border-bottom:1px solid var(--border)!important;padding-top:13px;padding-bottom:13px}
.gr:hover td{background:rgba(217,119,6,.04)!important}
.gr.open td{background:rgba(217,119,6,.03)!important}
.arr{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--bg2);color:var(--t3);font-size:10px;margin-right:10px;transition:transform .2s,background .15s,color .15s;vertical-align:middle;flex-shrink:0}
.gr.open .arr{transform:rotate(90deg);background:var(--accent-bg);color:var(--accent)}
.ono{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--t1);letter-spacing:.4px;vertical-align:middle}
.dr td{background:var(--bg);padding-top:9px;padding-bottom:9px;font-size:13px;color:var(--t3);border-bottom:1px solid var(--border2)!important}
.dr td:first-child{padding-left:52px}
.ship-lbl td{background:rgba(37,99,235,.04)!important;padding-top:7px!important;padding-bottom:5px!important}
.ship-lbl td:first-child{padding-left:52px}
.ship-row td{background:rgba(37,99,235,.02)!important;font-size:13px;border-top:1px dashed var(--border2)!important}
.ship-row td:first-child{padding-left:52px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:22px;font-size:12.5px;font-weight:600;white-space:nowrap}
.itag{font-size:10.5px;padding:1px 7px;border-radius:4px;font-weight:700;margin-left:5px;vertical-align:middle}

/* ── AMOUNTS ── */
.amt{font-family:var(--fm);font-variant-numeric:tabular-nums;white-space:nowrap}
.cod{font-family:var(--fm);font-size:13px;letter-spacing:.2px}
.nw{white-space:nowrap} .wrap{max-width:200px;word-break:break-word;white-space:normal;line-height:1.45}
.fw8{font-weight:800}.fw7{font-weight:700}.fw6{font-weight:600}

/* ── PAGE HEADER ── */
.phdr{margin-bottom:24px}
.pt{font-size:24px;font-weight:800;letter-spacing:-.4px}
.ps{font-size:14px;color:var(--t3);margin-top:4px}

/* ── ERROR ── */
.err{background:var(--red-bg);border:1px solid rgba(220,38,38,.2);border-radius:var(--rs);padding:13px 18px;color:var(--red);font-size:14px;margin-bottom:16px;font-weight:500}

/* ── FORM ── */
.fl{font-size:11.5px;font-weight:600;color:var(--t3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:10px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rx);color:var(--t1);font-size:14px;font-family:var(--f);transition:border .14s}
.fi:focus{border-color:var(--accent)}
.fi-sm{padding:8px 11px;font-size:13px}

/* ── BUTTONS ── */
.btn{padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);border:none;transition:all .14s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--surface);color:var(--t2);border:1px solid var(--border);box-shadow:var(--shadow)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12.5px;font-weight:600;border-radius:20px;border:none;cursor:pointer;font-family:var(--f)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.btn-info{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.btn-muted{background:var(--bg2);color:var(--t3);border:1px solid var(--border)}

/* ── SETTINGS ── */
.cfg-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.cfg-title{font-size:16px;font-weight:700;margin-bottom:16px}

/* ── CURRENCY BADGE ── */
.cur-usd{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10.5px;font-weight:700;background:rgba(37,99,235,.12);color:var(--blue);margin-left:4px;vertical-align:middle}
.cur-cny{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10.5px;font-weight:700;background:rgba(180,83,9,.12);color:var(--amt-total);margin-left:4px;vertical-align:middle}

/* ── SHOW ALL TOGGLE ── */
.show-all-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:13px;color:var(--t3)}
.toggle{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--accent)}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px)}

/* ── ARCHIVED ROW ── */
.archived-row td{opacity:.5}

@media(max-width:900px){.g5,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g5,.g4,.g3,.g2{grid-template-columns:1fr}main,header{padding-left:16px;padding-right:16px}nav{padding:0 12px}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-chip">N7R</div>
    <span class="logo-title">N7R 业务看板</span>
    <div class="logo-sep"></div>
    <span class="logo-sub">飞书实时同步</span>
  </div>
  <div class="hdr-r">
    <span class="hdr-date" id="d-date"></span>
    <span class="sync-meta" id="d-sync">未同步</span>
    <button class="sync-btn" id="sbtn" onclick="doSync()">
      <span class="dot" id="sdot"></span>刷新数据
    </button>
  </div>
</header>
<nav id="nav"></nav>
<main id="pg"></main>

<script>
/* ══════════════════════════════════════════════
   CONFIG & STORAGE
══════════════════════════════════════════════ */
const CK = 'n7r-cfg-v7';
let cfg = {
  dashboardUrl: 'https://ocr-tool.zhenita.workers.dev',
  ocrUrl: 'https://ocr-tool.zhenita.workers.dev',
  fs: {}
};
try { const s = localStorage.getItem(CK); if (s) cfg = { ...cfg, ...JSON.parse(s) }; } catch(e) {}
if (!cfg.fs) cfg.fs = {};
const saveC = () => localStorage.setItem(CK, JSON.stringify(cfg));
const du = p => cfg.dashboardUrl.replace(/\/$/, '') + p;
function saveFsField(key, val) { cfg.fs[key] = val; saveC(); }
function saveFsTid(tableKey, val) { if (!cfg.fs[tableKey]) cfg.fs[tableKey] = {}; cfg.fs[tableKey].tid = val; saveC(); }
function saveCfgField(key, val) { cfg[key] = val; saveC(); }

/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
let DB = { products:[], productionOrders:[], bOrders:[], advances:[], shipments:[], invoices:[] };
let lastSync = null, syncing = false;

async function doSync() {
  if (syncing) return;
  syncing = true;
  const btn = document.getElementById('sbtn'), dot = document.getElementById('sdot');
  btn.classList.add('loading'); dot.className = 'dot spin'; clearErr();
  try {
    const r = await fetch(du('/api/all'), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '数据错误');
    DB = { ...DB, ...normDB(j.data) };
    lastSync = new Date();
    document.getElementById('d-sync').textContent = '同步 ' + lastSync.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    dot.className = 'dot'; render();
  } catch(e) { showErr('同步失败: ' + e.message); dot.className = 'dot err'; }
  finally { syncing = false; btn.classList.remove('loading'); }
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
const N = v => parseFloat(v) || 0;
const F = n => N(n).toLocaleString('zh-CN', { minimumFractionDigits:2, maximumFractionDigits:2 });
const H = s => String(s||'').replace(/&/g,'&amp;').replace(/\x3C/g,'&lt;').replace(/\x3E/g,'&gt;');

const BM = {
  '研发中':['var(--blue)','var(--blue-bg)'],'生产中':['var(--orange)','var(--orange-bg)'],
  '已完成':['var(--green)','var(--green-bg)'],'已取消':['var(--red)','var(--red-bg)'],
  '待付款':['var(--orange)','var(--orange-bg)'],'已付款':['var(--green)','var(--green-bg)'],
  '部分付款':['var(--purple)','var(--purple-bg)'],'待生产':['var(--blue)','var(--blue-bg)'],
  '已发货':['var(--green)','var(--green-bg)'],'部分发货':['var(--purple)','var(--purple-bg)'],
  '已收货':['var(--green)','var(--green-bg)'],'部分收货':['var(--purple)','var(--purple-bg)'],
  '待发货':['var(--blue)','var(--blue-bg)'],'待收货':['var(--blue)','var(--blue-bg)'],
  '履约中':['var(--blue)','var(--blue-bg)'],'已完结':['var(--green)','var(--green-bg)'],
  '未还':['var(--red)','var(--red-bg)'],'部分还':['var(--orange)','var(--orange-bg)'],
  '已还清':['var(--green)','var(--green-bg)'],'供应商制单':['var(--orange)','var(--orange-bg)'],
  '我司出单':['var(--blue)','var(--blue-bg)'],'客户下单':['var(--teal)','var(--teal-bg)'],
  '收货':['var(--blue)','var(--blue-bg)'],'发货':['var(--green)','var(--green-bg)'],
  '已归档':['var(--t4)','rgba(0,0,0,.05)'],
};
function bdg(s) { const [c,bg] = BM[s] || ['var(--t3)','rgba(0,0,0,.07)']; return `<span class="badge" style="color:${c};background:${bg}">${H(s||'-')}</span>`; }
function itag(l,c,bg){ return `<span class="itag" style="background:${bg};color:${c}">${l}</span>`; }
function showErr(m){ let e=document.getElementById('_err'); if(!e){e=document.createElement('div');e.id='_err';e.className='err';document.getElementById('pg').prepend(e);}e.textContent=m; }
function clearErr(){ const e=document.getElementById('_err'); if(e)e.remove(); }
function kpi(l,v,s,c){ return `<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v" style="color:${c}">${v}</div><div class="kpi-s">${s||'&nbsp;'}</div></div>`; }

/* ══════════════════════════════════════════════
   字段标准化
══════════════════════════════════════════════ */
function normOrder(r) {
  if (!r) return r;
  return {
    ...r,
    orderNo:    r.orderNo    || r['订单编号'] || r._id || '',
    source:     r.source     || r['来源']     || '',
    sku:        r.sku        || r['SKU']      || '',
    product:    r.product    || r['产品名称'] || r.productName || '',
    qty:        N(r.qty      ?? r['数量']     ?? 0),
    unitPrice:  N(r.unitPrice ?? r['单价']    ?? 0),
    currency:   (r.currency  || r['币种']     || 'CNY').toUpperCase(),
    amount:     N(r.amount   ?? r['订单金额'] ?? 0),
    paidAmount: N(r.paidAmount ?? r['已付金额'] ?? r['已收金额'] ?? 0),
    status:     r.status     || r['生产状态'] || r['履约状态'] || '',
    payStatus:  r.payStatus  || r['付款状态'] || '',
    customer:   r.customer   || r['客户名称'] || '',
    supplier:   r.supplier   || r['供应商']   || '',
    zohoId:     r.zohoId     || r['ZohoID']   || '',
    orderType:  r.orderType  || r['订单类型'] || '',
  };
}
function normProduct(r) {
  if (!r) return r;
  return {
    ...r,
    sku:      r.sku      || r['SKU']      || r['产品编号'] || '',
    name:     r.name     || r['产品名称'] || r['名称']     || '',
    category: r.category || r['类别']     || '',
    stage:    r.stage    || r['阶段']     || '',
    status:   r.status   || r['状态']     || '',
    supplier: r.supplier || r['供应商']   || '',
    cost:     N(r.cost   ?? r['成本']     ?? 0),
  };
}
function normAdvance(r) {
  if (!r) return r;
  return {
    ...r,
    date:     r.date     || r['日期']       || '',
    purpose:  r.purpose  || r['用途说明']   || r['备注'] || '',
    currency: (r.currency || r['币种'] || 'CNY').toUpperCase(),
    amount:   N(r.amount   ?? r['垫付金额'] ?? 0),
    returned: N(r.returned ?? r['已还金额'] ?? 0),
    status:   r.status   || r['还款状态']   || '',
    notes:    r.notes    || r['备注']       || '',
  };
}
function normShipment(r) {
  if (!r) return r;
  return {
    ...r,
    date:         r.date         || r['日期']       || '',
    direction:    r.direction    || r['方向']       || '',
    relatedOrder: r.relatedOrder || r['关联订单号'] || '',
    sku:          r.sku          || r['SKU']        || '',
    product:      r.product      || r['产品名称']   || '',
    qty:          N(r.qty        ?? r['数量']       ?? 0),
    tracking:     r.tracking     || r['物流单号']   || '',
    notes:        r.notes        || r['备注']       || '',
  };
}
function normDB(raw) {
  return {
    products:         (raw.products         || []).map(normProduct),
    productionOrders: (raw.productionOrders || []).map(normOrder),
    bOrders:          (raw.bOrders          || []).map(normOrder),
    advances:         (raw.advances         || []).map(normAdvance),
    shipments:        (raw.shipments        || []).map(normShipment),
    invoices:         (raw.invoices         || []).map(r=>r),
  };
}

const CUR_SYM = { USD:'$', CNY:'¥', EUR:'€', GBP:'£', SGD:'S$', JPY:'¥', HKD:'HK$', AUD:'A$' };
function curSym(cur){ return CUR_SYM[(cur||'CNY').toUpperCase()] || (cur+'$'); }

/* ── 汇率系统：以USD为基准，调用免费API ── */
let FX = { rates:{}, updatedAt:null, loading:false };
async function fetchFX() {
  if(FX.loading) return;
  if(FX.updatedAt && Date.now()-FX.updatedAt < 3600000) return;
  FX.loading = true;
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    if(j.result === 'success') { FX.rates = j.rates; FX.updatedAt = Date.now(); render(); }
  } catch(e) {}
  FX.loading = false;
}
function toUSD(amount, cur) {
  if(!amount || !FX.rates || !FX.rates[cur]) return null;
  if(cur === 'USD') return amount;
  return amount / FX.rates[cur];
}
function mapToUSD(map) {
  if(!FX.rates || !Object.keys(FX.rates).length) return null;
  let total = 0, hasAny = false;
  for(const [cur, v] of Object.entries(map)) {
    if(v <= 0) continue;
    const usd = toUSD(v, cur);
    if(usd === null) return null;
    total += usd; hasAny = true;
  }
  return hasAny ? total : null;
}

function sumByCurrency(records, amountField) {
  const acc = {};
  (records||[]).forEach(r => {
    const cur = (r.currency || r['币种'] || 'CNY').toUpperCase();
    const val = N(r[amountField] !== undefined ? r[amountField] : 0);
    if(val !== 0) acc[cur] = (acc[cur] || 0) + val;
  });
  return acc;
}
function fmtCurLine(cur, v, c) {
  const sym = curSym(cur);
  return `<div style="margin-top:3px;line-height:1.3"><span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.07);color:var(--t3);margin-right:4px">${cur}</span><span style="font-size:16px;font-weight:700;color:${c};font-family:var(--fm)">${sym}${F(v)}</span></div>`;
}
function kpiCur(l, map, hint, c) {
  const entries = Object.entries(map).filter(([,v])=>v>0);
  if(!entries.length) return `<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v" style="color:${c}">—</div><div class="kpi-s">${hint||'&nbsp;'}</div></div>`;
  const usdTotal = mapToUSD(map);
  const fxAge = FX.updatedAt ? Math.round((Date.now()-FX.updatedAt)/60000) : null;
  const usdLine = usdTotal !== null
    ? `<div style="display:flex;align-items:baseline;gap:5px;padding-bottom:5px;margin-bottom:3px;border-bottom:1px solid var(--border2)">
        <span style="font-size:26px;font-weight:900;color:${c};font-family:var(--fm);letter-spacing:-.5px">$${F(usdTotal)}</span>
        <span style="font-size:10px;color:var(--t4)">${fxAge!==null ? '≈USD · 汇率'+fxAge+'min前' : '汇率加载中…'}</span>
      </div>`
    : `<div style="font-size:10px;color:var(--t4);padding-bottom:4px">汇率加载中…</div>`;
  const onlyUSD = entries.length===1 && entries[0][0]==='USD';
  const detailLines = onlyUSD ? '' : entries.map(([cur,v]) => fmtCurLine(cur,v,'var(--t2)')).join('');
  return `<div class="kpi"><div class="kpi-l">${l}</div>${usdLine}${detailLines}<div class="kpi-s">${hint||'&nbsp;'}</div></div>`;
}

/* ══════════════════════════════════════════════
   归档判断
   
   B端订单（卖给客户）：已付款 + 已发货 → 归档
   生产订单（向供应商买）：已付款 + 已收货 → 归档
   
   "已归档" = 钱收到了（或我付完了）且货也到位了
   → 从"待履约"移走，可以在归档列表里看到
══════════════════════════════════════════════ */

// B端：判断是否已归档（已付款 + 已发货/已完结）
function isBOrderArchived(g) {
  const payDone = g.pay === '已付款';
  const shipDone = g.fulfillSt === '已发货' || g.st === '已完结' || g.st === '已完成';
  return payDone && shipDone;
}

// 生产订单：判断是否已归档（已付款 + 已收货/已完结）
function isProdOrderArchived(g) {
  const payDone = g.pay === '已付款';
  const shipDone = g.fulfillSt === '已收货' || g.st === '已完结' || g.st === '已完成';
  return payDone && shipDone;
}

/* ══════════════════════════════════════════════
   出货记录查找
══════════════════════════════════════════════ */
const shipsFor = no => DB.shipments.filter(s => s.relatedOrder && String(s.relatedOrder).trim()===String(no).trim());

/* ══════════════════════════════════════════════
   自动计算履约状态
══════════════════════════════════════════════ */
function calcFulfillStatus(orderNo, orderQty, isProd) {
  const ships = shipsFor(orderNo);
  if (!ships.length) return null;
  const shipped = ships.reduce((s, r) => s + N(r.qty || 0), 0);
  const total = N(orderQty) || 0;
  if (total === 0) return null;
  const pct = shipped / total;
  if (pct <= 0)  return isProd ? '待收货' : '待发货';
  if (pct >= 1)  return isProd ? '已收货'  : '已发货';
  return isProd ? '部分收货' : '部分发货';
}

/* ══════════════════════════════════════════════
   分组：把 orders 数组按 orderNo 合并成组
   返回 [{k, rows, tot, paid, qty, cur, pay, st, fulfillSt, archived, ...}, ...]
══════════════════════════════════════════════ */
function groupOrders(orders, isProd) {
  const G = {};
  orders.forEach(o => {
    const k = String(o.orderNo||o._id||'—');
    if(!G[k]) G[k] = {
      k, rows:[], tot:0, paid:0,
      src: o.source, st: o.status, pay: o.payStatus,
      zoho: o.zohoId, cur:'CNY', qty:0,
      cust: o.customer,
    };
    const g = G[k];
    g.rows.push(o);
    g.tot  += N(o.amount);
    g.paid += N(o.paidAmount||0);
    g.qty  += N(o.qty||0);
    if(o.currency) g.cur = (o.currency||'CNY').toUpperCase();
    // 付款状态：优先取"未完成"的（已付款是最终态）
    if(o.payStatus) g.pay = o.payStatus;
  });
  // 计算履约状态 & 归档标记
  Object.values(G).forEach(g => {
    const autoSt = calcFulfillStatus(g.k, g.qty, isProd);
    g.fulfillSt = autoSt || g.st || '';
    g.archived = isProd ? isProdOrderArchived(g) : isBOrderArchived(g);
  });
  return Object.values(G);
}

/* PAGE: ORDERS（采购/生产订单）*/
function pgOrd(){
  const allGroups = groupOrders(DB.productionOrders, true);

  // 付款筛选
  const PAY_OPTS = [['all','全部'],['待付款','待付款'],['部分付款','部分付款'],['已付款','已付款']];
  // 收货筛选
  const SHIP_OPTS = [['all','全部'],['待收货','待收货'],['部分收货','部分收货'],['已收货','已收货']];

  let filtered = allGroups;
  if(ordPayF !== 'all') filtered = filtered.filter(g => g.pay === ordPayF);
  if(ordShipF !== 'all') filtered = filtered.filter(g => g.fulfillSt === ordShipF);

  const pending  = filtered.filter(g => !g.archived);
  const archived = filtered.filter(g => g.archived);
  const shown    = showArchived ? filtered : pending;

  // KPI：全部未归档（不受筛选影响）
  const allPending = allGroups.filter(g => !g.archived);
  const allArchived = allGroups.filter(g => g.archived);
  const amtByCur={}, paidByCur={};
  allPending.forEach(g=>{ amtByCur[g.cur]=(amtByCur[g.cur]||0)+g.tot; paidByCur[g.cur]=(paidByCur[g.cur]||0)+g.paid; });
  const dueByCur={};
  Object.keys({...amtByCur,...paidByCur}).forEach(cur=>{const d=(amtByCur[cur]||0)-(paidByCur[cur]||0);if(d>0)dueByCur[cur]=d});

  return `<div class="phdr">
    <div class="pt">📦 采购 · 付款 · 收货跟进</div>
    <div class="ps">我向供应商下的单 · 付款了没？货收到没？两个都完成自动归档</div>
  </div>
  <div class="g3">
    ${kpiCur('待付金额', dueByCur, allPending.length+'单进行中', 'var(--amt-due)')}
    ${kpiCur('已付', paidByCur, '', 'var(--amt-paid)')}
    ${kpi('✅ 已归档', allArchived.length+'单', '已付款且已收货', 'var(--t4)')}
  </div>
  <div class="sec">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
      ${pillGroup('付款', PAY_OPTS, ordPayF, 'setOrdPayF')}
      ${pillGroup('收货', SHIP_OPTS, ordShipF, 'setOrdShipF')}
    </div>
    <div class="card">
      <div class="tw"><table><thead><tr><th>订单号</th><th>来源</th><th>产品名称</th><th>数量</th><th>总金额</th><th>已付</th><th>待付</th><th>付款状态</th><th>收货状态</th></tr></thead><tbody>${prodTable(shown,'po')}</tbody></table></div>
      ${archived.length>0?`<div class="show-all-bar"><label class="toggle"><input type="checkbox" ${showArchived?'checked':''} onchange="showArchived=this.checked;render()"><span class="toggle-slider"></span></label><span>显示已归档（${archived.length}条 · 已付款已收货）</span></div>`:''}
    </div>
  </div>`;
}
function setOrdPayF(v){ordPayF=v;}
function setOrdShipF(v){ordShipF=v;}

  const FT=[
    {k:'rnd',       l:'🔬 研发生产',                  dt:'tbl64Snllt6Foss9'},
    {k:'production',l:'📦 生产订单',                  dt:'tblyUdlkUkAGiJwo'},
    {k:'b2b',       l:'🤝 B端订单',                   dt:'tbl1vDHZlSKGBeI7'},
    {k:'ship_in',   l:'📥📤 出货记录（收货+发货共用）', dt:'tbl5tQRwRLchLiL8'},

    <div class="cfg-title">🔌 Worker 连接</div>

    </div>
  </div>
  <div class="cfg-section">
    <div class="cfg-title">📋 归档规则说明</div>
    <div style="font-size:14px;color:var(--t2);line-height:2">
      <div>📦 <b>采购订单</b>：付款状态 = <span style="color:var(--green);font-weight:700">已付款</span> 且 收货状态 = <span style="color:var(--green);font-weight:700">已收货</span> → 自动归档</div>
      <div>🤝 <b>B端订单</b>：付款状态 = <span style="color:var(--green);font-weight:700">已付款</span> 且 发货状态 = <span style="color:var(--green);font-weight:700">已发货</span> → 自动归档</div>
      <div style="color:var(--t3);font-size:13px;margin-top:8px">归档后订单不在待办列表显示，可通过底部开关切换查看。发货状态根据出货记录数量自动计算。</div>
    </div>

}

async function pingWorker() {
  const el = document.getElementById('ping-res');
  if (el) el.textContent = '⏳ 测试中...';
  const base = (cfg.dashboardUrl || '').replace(/\/$/,'');
  if (!base) { if(el) el.innerHTML = '<span style="color:var(--red)">❌ 未配置 Worker URL</span>'; return; }
  try {
    const r = await fetch(base + '/api/ping').then(r=>r.json());
    if (r.ok) { if(el) el.innerHTML = '<span style="color:var(--green)">✓ 飞书连接正常</span>'; }
    else { if(el) el.innerHTML = '<span style="color:var(--red)">❌ ' + (r.error||'失败') + '</span>'; }
  } catch(e) { if(el) el.innerHTML = '<span style="color:var(--red)">❌ ' + e.message + '</span>'; }
}

async function listFields(tableKey) {
  const el = document.getElementById('fields-' + tableKey);
  if (!el) return;
  el.textContent = '⏳ 查询中...';
  const base = (cfg.dashboardUrl || '').replace(/\/$/,'');
  const DEFAULT_TIDS = {
    rnd:'tbl64Snllt6Foss9', production:'tblyUdlkUkAGiJwo', b2b:'tbl1vDHZlSKGBeI7',
    ship_in:'tbl5tQRwRLchLiL8', advance:'tbl7FGIDEtkZBid8'
  };
  const tid = cfg.fs?.[tableKey]?.tid || DEFAULT_TIDS[tableKey] || '';
  try {
    const r = await fetch(base + '/feishu', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tableId: tid, action: 'list_fields' })
    }).then(r=>r.json());
    const fields = r.data?.items || [];
    el.textContent = fields.length ? fields.map(f=>f.field_name).join(' | ') : '无结果';
  } catch(e) { el.textContent = '❌ ' + e.message; }
}
